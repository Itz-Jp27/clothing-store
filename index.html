<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StyleCart</title>

<link rel="icon" type="image/png" href="favicon icon.png">
<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

</head>

<body>

<!-- Loader -->
<div id="loader">Loading Store...</div>

<!-- Header -->
<header>
<img src="logo.png" class="logo">

<div class="search">
<input id="search" placeholder="Search products..." onkeyup="searchProducts()">
</div>

<div class="cart-icon" onclick="toggleCart()">
🛒 Cart (<span id="cart-count">0</span>)
</div>
</header>

<!-- Hero -->
<section class="hero">
<h1>Discover Your Style</h1>
<p>Premium Brands | Best Prices</p>
<button onclick="scrollToProducts()">Shop Now</button>
</section>

<!-- Trending Button -->
<div style="padding:15px;">
<button onclick="showTrending()">🔥 Trending</button>
</div>

<!-- Main Layout -->
<div class="layout">

<!-- Sidebar -->
<aside class="sidebar">

<select onchange="sortProducts(this.value)">
<option value="">Sort By</option>
<option value="low">Price Low → High</option>
<option value="high">Price High → Low</option>
</select>

<h3>Brands</h3>
<div id="brand-filters"></div>

</aside>

<!-- MAIN CONTENT -->
<div class="main-content">

<!-- Products -->
<section id="products" class="products"></section>

<!-- Recommendations -->
<section class="recommend-section">
<h2>Recommended for You</h2>
<div id="recommendations" class="products"></div>
</section>

</div>

</div>

<!-- No Products -->
<p id="empty" style="display:none;text-align:center;margin-top:20px;">
No products found
</p>

<!-- Cart -->
<div class="cart-slider" id="cart">

<div style="display:flex;justify-content:space-between;">
<h2>Your Cart</h2>
<button onclick="toggleCart()">✖</button>
</div>

<div id="cart-items"></div>

<h3 id="total">Total ₹0</h3>

<a href="checkout.html">
<button class="checkout">Proceed To Checkout</button>
</a>

</div>

<!-- Toast -->
<div id="toast">Added to Cart</div>

<!-- Quick View -->
<div class="quick-view" id="quickview">
<div class="quick-box">

<img id="q-img">
<h2 id="q-name"></h2>
<p id="q-price"></p>

<button onclick="closeQuick()">Close</button>

</div>
</div>

<script src="script.js" defer></script>

</body>
</html>
