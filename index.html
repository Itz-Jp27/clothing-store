<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleCart</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<!-- Loader -->
<div id="loader">Loading Store...</div>

<!-- Header -->
<header>
<img src="logo.png" class="logo">

<div class="search">
<input id="search" placeholder="Search..." onkeyup="searchProducts()">
</div>

<button onclick="toggleDark()">🌙</button>

<div class="cart-icon" onclick="toggleCart()">
🛒 (<span id="cart-count">0</span>)
</div>
</header>

<!-- Hero -->
<section class="hero">
<h1>Discover Your Style</h1>
<p>Premium Brands | Best Prices</p>
<button onclick="scrollToProducts()">Shop Now</button>
</section>
<section class="recommend-section">
<h2 style="padding:20px;">Recommended for You</h2>
<div id="recommendations" class="products"></div>
</section>
<!-- Layout -->
<div class="layout">

<!-- Sidebar -->
<aside class="sidebar">
<select onchange="sortProducts(this.value)">
<option value="">Sort</option>
<option value="low">Low → High</option>
<option value="high">High → Low</option>
</select>

<h3>Brands</h3>
<div id="brand-filters"></div>
</aside>

<!-- Main Content -->
<div class="main-content">

<!-- ✅ FIX: added class="products" -->
<section id="products" class="products"></section>


<!-- ✅ FIX: added class="products" -->
<div id="recommendations" class="products"></div>

</section>

</div>
</div>

<p id="empty">No products found</p>

<!-- Cart -->
<div class="cart-slider" id="cart">
<h2>Cart</h2>
<div id="cart-items"></div>
<h3 id="total">Total ₹0</h3>
</div>

<!-- Toast -->
<div id="toast">Added to Cart</div>

<!-- Quick View -->
<div class="quick-view" id="quickview">
<div class="quick-box">
<img id="q-img">
<h2 id="q-name"></h2>
<p id="q-price"></p>
<button onclick="closeQuick()">Close</button>
</div>
</div>

<script src="script.js"></script>

</body>
</html>
