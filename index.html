<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleCart</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<div id="loader">Loading Store...</div>

<header>
<h2>StyleCart</h2>

<input id="search" placeholder="Search..." onkeyup="searchProducts()">

<div onclick="toggleCart()">🛒 (<span id="cart-count">0</span>)</div>
</header>

<!-- HERO -->
<section class="hero">
<h1>Discover Your Style</h1>
<button onclick="scrollToProducts()">Shop Now</button>
</section>

<!-- ✅ RECOMMENDATIONS BELOW HERO -->
<section class="recommend-section">
<h2>Recommended for You</h2>
<div class="products" id="recommendations"></div>
</section>

<!-- PRODUCTS -->
<div class="layout">
<section id="products"></section>
</div>

<p id="empty">No products found</p>

<!-- CART -->
<div id="cart" class="cart">
<h2>Cart</h2>
<div id="cart-items"></div>
<h3 id="total">₹0</h3>
</div>

<!-- QUICK VIEW -->
<div id="quickview" class="quick">
<div>
<img id="q-img">
<h2 id="q-name"></h2>
<p id="q-price"></p>
<button onclick="closeQuick()">Close</button>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
