<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StyleCart</title>

<!-- ✅ Favicon -->
<link rel="icon" type="image/png" href="favicon icon.png">

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

</head>

<body>

<!-- ================= LOADER ================= -->
<div id="loader">Loading Store...</div>

<!-- ================= HEADER ================= -->
<header>

<img src="logo.png" class="logo">

<div class="search">
<input id="search" placeholder="Search products..." onkeyup="searchProducts()">
</div>

<div style="display:flex;align-items:center;gap:10px;">
<button onclick="toggleDark()">🌙</button>

<div class="cart-icon" onclick="toggleCart()">
🛒 (<span id="cart-count">0</span>)
</div>
</div>

</header>

<!-- ================= HERO ================= -->
<section class="hero">
<h1>Discover Your Style</h1>
<p>Premium Brands | Best Prices</p>
<button onclick="scrollToProducts()">Shop Now</button>
</section>

<!-- ================= RECOMMEND (TOP) ================= -->
<section class="recommend-section">
<h2>Recommended for You</h2>
<div id="recommendations" class="products"></div>
</section>

<!-- ================= MAIN LAYOUT ================= -->
<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">

<select onchange="sortProducts(this.value)">
<option value="">Sort</option>
<option value="low">Price Low → High</option>
<option value="high">Price High → Low</option>
</select>

<h3>Brands</h3>
<div id="brand-filters"></div>

</aside>

<!-- MAIN CONTENT -->
<div class="main-content">

<section id="products" class="products"></section>

</div>

</div>

<!-- ================= EMPTY ================= -->
<p id="empty">No products found</p>

<!-- ================= CART ================= -->
<div class="cart-slider" id="cart">

<div style="display:flex;justify-content:space-between;align-items:center;">
<h2>Cart</h2>
<button onclick="toggleCart()">✖</button>
</div>

<div id="cart-items"></div>

<h3 id="total">Total ₹0</h3>

</div>

<!-- ================= TOAST ================= -->
<div id="toast">Added to Cart</div>

<!-- ================= QUICK VIEW ================= -->
<div class="quick-view" id="quickview">

<div class="quick-box">

<img id="q-img">

<h2 id="q-name"></h2>

<p id="q-price"></p>

<button onclick="closeQuick()">Close</button>

</div>

</div>

<!-- ================= SCRIPT ================= -->
<script src="script.js"></script>

</body>
</html>
