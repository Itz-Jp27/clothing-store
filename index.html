<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JP Clothing Store</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<div id="loader">
Loading Store...
</div>

<header>

<h2 class="logo">JP Fashion</h2>

<div class="search">
<input id="search" placeholder="Search products..." onkeyup="searchProducts()">
</div>

<div class="cart-icon" onclick="toggleCart()">
🛒 <span id="cart-count">0</span>
</div>

</header>


<section class="hero">
<h1>Discover Your Style</h1>
<button onclick="scrollToProducts()">Shop Now</button>
</section>


<div class="layout">

<aside class="sidebar">

<select onchange="sortProducts(this.value)">
<option value="">Sort By</option>
<option value="low">Price Low → High</option>
<option value="high">Price High → Low</option>
</select>

<h3>Brands</h3>

<div id="brand-filters"></div>

</aside>


<section class="products" id="products"></section>

</div>


<p id="empty">No products found</p>


<div class="cart-slider" id="cart">

<h2>Your Cart</h2>

<div id="cart-items"></div>

<h3 id="total">Total ₹0</h3>

<a href="checkout.html">
<button class="checkout">Checkout</button>
</a>

</div>


<div id="toast">Added to Cart</div>


<div class="quick-view" id="quickview">

<div class="quick-box">

<img id="q-img">

<h2 id="q-name"></h2>

<p id="q-price"></p>

<button onclick="closeQuick()">Close</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
