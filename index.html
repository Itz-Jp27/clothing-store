<!DOCTYPE html>
<html>
<head>
<title>JP's Clothing Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
<h2>JP's Store</h2>

<ul>
<li>Home</li>
<li>Brands</li>
<li>Products</li>
<li>Contact</li>
</ul>

<div class="nav-buttons">
<button onclick="toggleDarkMode()">🌙</button>
<div class="cart">🛒 <span id="cart-count">0</span></div>
</div>

</nav>

<section class="hero">
<h1>Welcome to JP Clothing</h1>
<p>Find the best fashion brands</p>
</section>

<section class="products">

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Nike T-Shirt</h3>
<p>₹999</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Adidas Hoodie</h3>
<p>₹1999</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Puma Sneakers</h3>
<p>₹2999</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Zara Jacket</h3>
<p>₹3499</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

</section>

<footer>
<p>© 2026 JP Clothing Store</p>
</footer>

<script src="script.js"></script>

</body>
</html>
