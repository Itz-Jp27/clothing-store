<!DOCTYPE html>
<html>
<head>
<title>JP Clothing Store</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

</head>

<body>

<nav>

<h2>JP Clothing</h2>

<input type="text" id="search" placeholder="Search..." onkeyup="searchProducts()">

<ul>
<li>Home</li>
<li>Brands</li>
<li>Products</li>
<li>Contact</li>
</ul>

<div class="nav-right">

<button onclick="toggleDarkMode()">🌙</button>

<a href="cart.html">🛒 Cart (<span id="cart-count">0</span>)</a>

</div>

</nav>

<section class="hero">

<h1>Welcome to JP Clothing Store</h1>

<p>Find the best fashion brands</p>

</section>

<section class="products">

<div class="product">

<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">

<h3>Nike T-Shirt</h3>

<p>₹999</p>

<button onclick="addToCart('Nike T-Shirt')">Add to Cart</button>

<button onclick="addToWishlist('Nike T-Shirt')">❤️</button>

</div>


<div class="product">

<img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">

<h3>Adidas Hoodie</h3>

<p>₹1999</p>

<button onclick="addToCart('Adidas Hoodie')">Add to Cart</button>

<button onclick="addToWishlist('Adidas Hoodie')">❤️</button>

</div>


<div class="product">

<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">

<h3>Puma Sneakers</h3>

<p>₹2999</p>

<button onclick="addToCart('Puma Sneakers')">Add to Cart</button>

<button onclick="addToWishlist('Puma Sneakers')">❤️</button>

</div>


<div class="product">

<img src="https://images.unsplash.com/photo-1520975922284-9a6c1f0a0f7c">

<h3>Zara Jacket</h3>

<p>₹3499</p>

<button onclick="addToCart('Zara Jacket')">Add to Cart</button>

<button onclick="addToWishlist('Zara Jacket')">❤️</button>

</div>

</section>

<footer>

<p>© 2026 JP Clothing Store</p>

</footer>

<script src="script.js"></script>

</body>
</html>
